<div class="max-w-md mx-auto mt-10 p-8 bg-gradient-to-br from-gray-900 to-black rounded-3xl text-center shadow-xl border border-gray-800">
    <p id="greeting" class="text-gray-400 uppercase tracking-widest text-sm mb-2"></p>
    <h1 id="clock" class="text-6xl font-black text-white tabular-nums tracking-tighter">00:00:00</h1>
    <p id="dateDisplay" class="text-gray-500 mt-2 italic text-sm"></p>
</div>

<script>
    function updateClock() {
        const now = new Date();
        const h = now.getHours();
        const m = String(now.getMinutes()).padStart(2, '0');
        const s = String(now.getSeconds()).padStart(2, '0');
        
        document.getElementById('clock').innerText = `${String(h).padStart(2, '0')}:${m}:${s}`;
        
        // Greeting Logic
        let greet = "";
        if (h >= 5 && h < 12) greet = "Good Morning ☀️";
        else if (h >= 12 && h < 18) greet = "Good Afternoon ☕";
        else if (h >= 18 && h < 22) greet = "Good Evening 🌆";
        else greet = "Good Night 🌙";
        
        document.getElementById('greeting').innerText = greet;
        document.getElementById('dateDisplay').innerText = now.toDateString();
    }

    setInterval(updateClock, 1000);
    updateClock(); // Run immediately
</script>
